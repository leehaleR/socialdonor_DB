{% extends 'home/base.html' %}
{% load crispy_forms_tags %}

{% block content %}
    <div class="content-section container log">
        <form method="POST">
            {% csrf_token %}
            <fieldset class="form-group">
                <h1 style="text-align:center;"><a style="text-decoration: none; color: #00003e;" href="{% url 'home-page' %}">SocialDonors</a></h1>
                <legend class="border-bottom mb-4">login</legend>
                {{ form|crispy }}
            </fieldset>
            <div class="form-group">
                <button class="btn btn-outline-info" type="submit">login</button>
            </div>
        </form>
        <div class="border-top pt-4">
            <small class="text-muted">
                need a account?<a class="ml-2" href="{% url 'reg-page' %}">signup</a>
            </small>
        </div>
    </div>
{% endblock content %}
